name: verify-site

on:
  push:
    branches: [main]
    paths: ['docs/**', 'firebase.json', 'scripts/**']
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify repo files
        run: bash scripts/verify-site.sh local
      - name: Smoke check live site
        run: bash scripts/verify-site.sh live
